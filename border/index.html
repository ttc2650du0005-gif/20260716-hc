<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>境界線 border:</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>境界線 border:</h1>

    <p>border:</p>

    <hr>

    <!-- 演習：リスト項目に線 -->
    <ul>
        <li>リスト 1</li>
        <li>リスト 2</li>
        <li>リスト 3</li>
        <li>リスト 4</li>
        <li>リスト 5</li>
    </ul>

    <hr>

    <!-- 演習：線の種類 -->
    <div class="solid">実線</div>
    <div class="dashed">破線</div>
    <div class="dotted">点線</div>
    <div class="double">二重線</div>
    <div class="groove">彫り込んだような線</div>
    <div class="ridge">盛り上がったような線</div>
    <div class="inset">内側に押し込んだような線</div>
    <div class="outset">外側へ浮き出たような線</div>
</body>

</html>
